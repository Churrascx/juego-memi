<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Te quiero mucho mi memi</title>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: Arial, sans-serif;
      background: linear-gradient(#ffd6e8, #fff0f6);
      touch-action: none;
    }

    #inicio {
      position: fixed;
      width: 100vw;
      height: 100vh;
      background: linear-gradient(#ffd6e8, #fff0f6);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      color: #c2185b;
      z-index: 100;
      padding: 20px;
      box-sizing: border-box;
    }

    #inicio h1 {
      font-size: 34px;
      margin-bottom: 10px;
    }

    #inicio p {
      font-size: 20px;
      margin-bottom: 25px;
      max-width: 350px;
    }

    #inicio button {
      padding: 15px 25px;
      border: none;
      border-radius: 20px;
      background: #e91e63;
      color: white;
      font-size: 20px;
      cursor: pointer;
    }

    #juego {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }

    #titulo {
      position: absolute;
      top: 20px;
      width: 100%;
      text-align: center;
      font-size: 26px;
      color: #c2185b;
      font-weight: bold;
      z-index: 10;
    }

    #puntaje {
      position: absolute;
      top: 60px;
      width: 100%;
      text-align: center;
      font-size: 22px;
      color: #880e4f;
      z-index: 10;
    }

    #mute {
      position: absolute;
      top: 100px;
      right: 20px;
      padding: 10px 13px;
      border: none;
      border-radius: 50%;
      background: white;
      font-size: 20px;
      z-index: 15;
      box-shadow: 0 0 10px rgba(0,0,0,0.2);
      cursor: pointer;
    }

    #jugador {
      position: absolute;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 55px;
      user-select: none;
    }

    .corazon {
      position: absolute;
      top: -50px;
      font-size: 35px;
      user-select: none;
    }

    #mensaje {
      position: absolute;
      left: 50%;
      top: 45%;
      transform: translate(-50%, -50%);
      background: white;
      color: #ad1457;
      padding: 25px;
      border-radius: 20px;
      text-align: center;
      width: 80%;
      max-width: 350px;
      font-size: 20px;
      box-shadow: 0 0 20px rgba(0,0,0,0.2);
      display: none;
      z-index: 20;
    }

    #boton {
      margin-top: 15px;
      padding: 12px 20px;
      border: none;
      border-radius: 15px;
      background: #e91e63;
      color: white;
      font-size: 18px;
      cursor: pointer;
    }
  </style>
</head>

<body>

  <audio id="musica" loop>
    <source src="musica.mp3" type="audio/mpeg">
  </audio>

  <div id="inicio">
    <h1>Corazoncitos para mi memi ❤️</h1>
    <p>Un jueguito hecho con mucho cariño para ti.</p>
    <button onclick="comenzarJuego()">Comenzar</button>
  </div>

  <div id="juego">
    <div id="titulo">Corazoncitos para mi memi &lt;3 ❤️</div>
    <div id="puntaje">Corazoncitos atrapados: 0</div>

    <button id="mute" onclick="pausarMusica()">🔊</button>

    <div id="jugador">🧺</div>

    <div id="mensaje">
      <div id="textoMensaje"></div>
      <button id="boton" onclick="cerrarMensaje()">Seguir jugando</button>
    </div>
  </div>

  <script>
    const juego = document.getElementById("juego");
    const jugador = document.getElementById("jugador");
    const puntajeTexto = document.getElementById("puntaje");
    const mensaje = document.getElementById("mensaje");
    const textoMensaje = document.getElementById("textoMensaje");
    const boton = document.getElementById("boton");
    const musica = document.getElementById("musica");
    const pantallaInicio = document.getElementById("inicio");
    const botonMute = document.getElementById("mute");
    
    let juegoTerminado = false;
    let juegoIniciado = false;
    let juegoPausado = false;

    const frases = [
      "Gracias por hacerme tan feliz ❤️",
      "Cada corazoncito es una muestra de lo mucho que te quiero 💖",
      "Vas muy bien mi tomatito memi 🍅",
      "Este juego es pequeño, pero hecho con mucho cariño ✨",
      "Te quiero muchito ❤️"
    ];

    function comenzarJuego() {
      pantallaInicio.style.display = "none";
      juegoIniciado = true;

      musica.volume = 0.4;
      musica.play();
    }

    function pausarMusica() {
      if (musica.paused) {
        musica.play();
        botonMute.textContent = "🔊";
      } else {
        musica.pause();
        botonMute.textContent = "🔇";
      }
    }

    function moverJugador(x) {
      const ancho = window.innerWidth;
      const limiteIzq = 20;
      const limiteDer = ancho - 70;

      if (x < limiteIzq) x = limiteIzq;
      if (x > limiteDer) x = limiteDer;

      jugador.style.left = x + "px";
    }

    document.addEventListener("mousemove", function(e) {
      moverJugador(e.clientX);
    });

    document.addEventListener("touchmove", function(e) {
      moverJugador(e.touches[0].clientX);
    });

    function crearCorazon() {
      if (!juegoIniciado || juegoTerminado || juegoPausado) return;

      const corazon = document.createElement("div");
      corazon.classList.add("corazon");
      corazon.textContent = "❤️";

      corazon.style.left = Math.random() * (window.innerWidth - 40) + "px";
      juego.appendChild(corazon);

      let posicionY = -50;
      let velocidad = 3 + Math.random() * 3;

       const intervalo = setInterval(function() {
        if (juegoTerminado) {
          clearInterval(intervalo);
          corazon.remove();
          return;
        }

  if (juegoPausado) return;

  posicionY += velocidad;
  corazon.style.top = posicionY + "px";

        posicionY += velocidad;
        corazon.style.top = posicionY + "px";

        const rectCorazon = corazon.getBoundingClientRect();
        const rectJugador = jugador.getBoundingClientRect();

        const choca =
          rectCorazon.bottom >= rectJugador.top &&
          rectCorazon.top <= rectJugador.bottom &&
          rectCorazon.right >= rectJugador.left &&
          rectCorazon.left <= rectJugador.right;

        if (choca) {
          puntaje++;
          puntajeTexto.textContent = "Corazoncitos atrapados: " + puntaje;

          corazon.remove();
          clearInterval(intervalo);

          revisarMensaje();
        }

        if (posicionY > window.innerHeight) {
          corazon.remove();
          clearInterval(intervalo);
        }
      }, 20);
    }

    function revisarMensaje() {
      if (puntaje === 5) {
        mostrarMensaje(frases[0]);
      } else if (puntaje === 10) {
        mostrarMensaje(frases[1]);
      } else if (puntaje === 20) {
        mostrarMensaje(frases[2]);
      } else if (puntaje === 27) {
        mostrarMensaje(frases[3]);
      } else if (puntaje === 35) {
        mostrarMensaje(frases[4]);
      } else if (puntaje === 40) {
        juegoTerminado = true;

        mostrarMensaje(
          "Ganaste 💖<br><br>" +
          "Gracias por llegar a mi vida &lt;3<br><br>" +
          "Gracias por todo lo que me haces sentir. " +
          "Eres una persona de verdad muy importante para mí."
        );

        boton.textContent = "Volver a jugar";
        boton.onclick = function() {
          location.reload();
        };
      }
    }

   function mostrarMensaje(texto) {
      juegoPausado = true;
      textoMensaje.innerHTML = texto;
      mensaje.style.display = "block";
    }

function cerrarMensaje() {
  juegoPausado = false;
  mensaje.style.display = "none";
}

    function cerrarMensaje() {
      mensaje.style.display = "none";
    }

    setInterval(crearCorazon, 900);
  </script>
</body>
</html>
